-----

- name: Minimal MSSQL Connection and InSpec Test
  hosts: localhost
  gather_facts: yes
  vars:
  
  # MSSQL Connection Parameters
  
  mssql_server: “JABDWYCO716”
  mssql_port: 1733
  mssql_database: “Server_Guru”
  
  # Test Configuration
  
  test_results_dir: “/tmp/mssql_test_{{ ansible_date_time.epoch }}”
  inspec_profile: “./mssql_basic_test.rb”
  
  tasks:
  - name: Create test results directory
    file:
    path: “{{ test_results_dir }}”
    state: directory
    mode: ‘0755’
  - name: Display test configuration
    debug:
    msg: |
    MSSQL Test Configuration:
    Server: {{ mssql_server }}:{{ mssql_port }}
    Database: {{ mssql_database }}
    Authentication: Windows (-E)
    InSpec Profile: {{ inspec_profile }}
  - name: Test network connectivity
    shell: |
    timeout 10 telnet {{ mssql_server }} {{ mssql_port }} 2>&1 | grep -E “(Connected|Escape character)” || echo “FAILED”
    register: network_test
    failed_when: false
    changed_when: false
  - name: Evaluate network connectivity
    set_fact:
    network_ok: “{{ ‘Connected’ in network_test.stdout or ‘Escape character’ in network_test.stdout }}”
  - name: Test basic database connection
    shell: |
    sqlcmd -S {{ mssql_server }},{{ mssql_port }} -d {{ mssql_database }} -E -Q “SELECT ‘CONNECTION_SUCCESS’ as result” -h-1
    register: db_test
    failed_when: false
    changed_when: false
    when: network_ok
  - name: Evaluate database connectivity
    set_fact:
    db_ok: “{{ db_test.rc == 0 and ‘CONNECTION_SUCCESS’ in db_test.stdout }}”
    when: network_ok
  - name: Execute InSpec profile
    shell: |
    /usr/bin/inspec exec {{ inspec_profile }}   
    –input server={{ mssql_server }} port={{ mssql_port }} database={{ mssql_database }}   
    –reporter=json   
    –no-color
    register: inspec_result
    failed_when: false
    changed_when: false
    when: network_ok and db_ok
  - name: Save InSpec results
    copy:
    content: “{{ inspec_result.stdout }}”
    dest: “{{ test_results_dir }}/inspec_results.json”
    when: inspec_result is defined and inspec_result.stdout != “”
  - name: Display test results
    debug:
    msg: |
    === Test Results Summary ===
    Network Connectivity: {{ ‘PASS’ if network_ok else ‘FAIL’ }}
    Database Connection: {{ ‘PASS’ if (db_ok | default(false)) else ‘FAIL’ }}
    InSpec Execution: {{ ‘PASS’ if (inspec_result.rc | default(1)) == 0 else ‘FAIL’ }}
    
    ```
    Results saved to: {{ test_results_dir }}/
    
    {% if not network_ok %}
    NEXT: Check network connectivity - see troubleshooting guide
    {% elif not (db_ok | default(false)) %}
    NEXT: Check database connection - see troubleshooting guide  
    {% elif (inspec_result.rc | default(1)) != 0 %}
    NEXT: Check InSpec setup - see troubleshooting guide
    {% else %}
    SUCCESS: All tests passed
    {% endif %}
    ```