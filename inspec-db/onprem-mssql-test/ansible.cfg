[defaults]
# Inventory configuration
inventory = ./inventory.yml
host_key_checking = False
retry_files_enabled = False

# Logging - use current directory since no home directory access
log_path = ./ansible.log

# Gathering and caching - use memory only (no file system caching)
gathering = smart
fact_caching = memory
fact_caching_timeout = 86400

# Output formatting
stdout_callback = yaml
callback_whitelist = timer, profile_tasks

# Connection settings
timeout = 60
forks = 5

# Disable features that require home directory access
lookup_plugins = /usr/share/ansible/plugins/lookup
callback_plugins = /usr/share/ansible/plugins/callback
connection_plugins = /usr/share/ansible/plugins/connection
filter_plugins = /usr/share/ansible/plugins/filter
test_plugins = /usr/share/ansible/plugins/test
strategy_plugins = /usr/share/ansible/plugins/strategy
cache_plugins = /usr/share/ansible/plugins/cache

# Use system-wide plugin locations instead of user home
action_plugins = /usr/share/ansible/plugins/action
module_utils = /usr/share/ansible/module_utils

# Disable user-specific features
display_skipped_hosts = False
display_ok_hosts = True
deprecation_warnings = False
command_warnings = False

# Use current working directory for temporary files
local_tmp = ./tmp
remote_tmp = /tmp

[inventory]
enable_plugins = yaml, ini, script

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
control_path_dir = /tmp

[persistent_connection]
# Use /tmp for persistent connections
control_path_dir = /tmp

[galaxy]
# Disable galaxy features that might require home directory
server_list = 

[colors]
# Enable colors for better readability
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
